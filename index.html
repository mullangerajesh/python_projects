<!DOCTYPE html>
<head>
    <title>calculator</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="calculator.css"/>
</head>
<body>
<div id="calculator">
    <input id="display" readonly />
    <div id="keys">
        <button onclick="keysAddon('+')" class="operator">+</button>
        <button onclick="keysAddon('-')" class="operator">-</button>
        <button onclick="keysAddon('*')" class="operator">*</button>
        <button onclick="keysAddon('/')" class="operator">/</button>
        <button onclick="keysAddon('1')">1</button>
        <button onclick="keysAddon('2')">2</button>
        <button onclick="keysAddon('3')">3</button>
        <button onclick="keysAddon('4')">4</button>
        <button onclick="keysAddon('5')">5</button>
        <button onclick="keysAddon('6')">6</button>
        <button onclick="keysAddon('7')">7</button>
        <button onclick="keysAddon('8')">8</button>
        <button onclick="keysAddon('9')">9</button>
        <button onclick="keysAddon('0')">0</button>
        
        <button onclick="clearDisplay()" class="operator">C</button>
        <button onclick="calculate()" class="operator">=</button>

    </div>
</div>
<script src="calculator.js"></script>
</body>
</html>
